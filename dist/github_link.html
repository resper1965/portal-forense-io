<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="0; url=https://github.com/forense-io/PPS-01711-2026">
  <title>Redirecionando para GitHub...</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background-color: #0d1117;
      color: #c9d1d9;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .container {
      text-align: center;
    }
    .spinner {
      border: 4px solid rgba(240, 246, 252, 0.1);
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border-left-color: #58a6ff;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px auto;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    a {
      color: #58a6ff;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner"></div>
    <p>Redirecionando para o Repositório de Governança no GitHub...</p>
    <p>Se você não for redirecionado automaticamente, <a href="https://github.com/forense-io/PPS-01711-2026">clique aqui</a>.</p>
  </div>
</body>
</html>
